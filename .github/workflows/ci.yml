name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  basic-checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run syntax checks
        run: npm run check

      - name: Validate release flow
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\release.ps1 -DryRun
